<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API — Честная Генерация</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --text-primary: #1a1a18;
  --text-secondary: #5f5e5a;
  --text-muted: #888780;
  --surface-0: #f1efe8;
  --surface-1: #f8f7f3;
  --surface-2: #ffffff;
  --border: rgba(0,0,0,.1);
  --border-strong: rgba(0,0,0,.18);
  --bg-accent: #e6f1fb; --text-accent: #185fa5; --border-accent: #b5d4f4;
  --bg-success: #eaf3de; --text-success: #3b6d11; --border-success: #c0dd97;
  --bg-warning: #faeeda; --text-warning: #854f0b; --border-warning: #fac775;
  --bg-danger: #fcebeb; --text-danger: #a32d2d; --border-danger: #f7c1c1;
  --bg-pro: #eeedfe; --text-pro: #534ab7; --border-pro: #cecbf6;
  --radius: 8px;
  --font-mono: 'Consolas', 'Monaco', monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --text-primary: #e8e7e1;
    --text-secondary: #b4b2a9;
    --text-muted: #888780;
    --surface-0: #1e1e1c;
    --surface-1: #252523;
    --surface-2: #2e2e2b;
    --border: rgba(255,255,255,.1);
    --border-strong: rgba(255,255,255,.18);
    --bg-accent: #042c53; --text-accent: #85b7eb; --border-accent: #0c447c;
    --bg-success: #173404; --text-success: #97c459; --border-success: #3b6d11;
    --bg-warning: #412402; --text-warning: #ef9f27; --border-warning: #854f0b;
    --bg-danger: #501313; --text-danger: #f09595; --border-danger: #791f1f;
    --bg-pro: #26215c; --text-pro: #afa9ec; --border-pro: #3c3489;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  background: var(--surface-0);
  color: var(--text-primary);
  min-height: 100vh;
}
header {
  background: var(--surface-2);
  border-bottom: 0.5px solid var(--border-strong);
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 { font-size: 17px; font-weight: 500; }
header .version { font-size: 12px; color: var(--text-muted); background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 4px; padding: 2px 8px; }
.container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }
.tag-section { margin-bottom: 1.5rem; }
.tag-label {
  font-size: 15px; font-weight: 500; color: var(--text-primary);
  border-bottom: 0.5px solid var(--border-strong);
  padding-bottom: 8px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
}
.tag-label i.chevron { margin-left: auto; font-size: 13px; color: var(--text-muted); transition: transform .15s; }
.tag-label.collapsed i.chevron { transform: rotate(-90deg); }
.endpoints { display: flex; flex-direction: column; gap: 4px; }
.ep { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.ep-head {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; cursor: pointer;
  background: var(--surface-2);
}
.ep-head:hover { background: var(--surface-1); }
.method {
  font-size: 11px; font-weight: 500; padding: 2px 8px;
  border-radius: 4px; min-width: 52px; text-align: center;
  letter-spacing: .3px; font-family: var(--font-mono);
}
.GET    { background: var(--bg-success); color: var(--text-success); }
.POST   { background: var(--bg-accent);  color: var(--text-accent); }
.PUT    { background: var(--bg-warning); color: var(--text-warning); }
.PATCH  { background: var(--bg-pro);     color: var(--text-pro); }
.DELETE { background: var(--bg-danger);  color: var(--text-danger); }
.WS     { background: var(--bg-warning); color: var(--text-warning); }
.path { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-primary); flex: 1; }
.path em { color: var(--text-accent); font-style: normal; }
.ep-summary { font-size: 12px; color: var(--text-muted); margin-left: auto; }
.ep-chev { font-size: 12px; color: var(--text-muted); transition: transform .15s; }
.ep-head.open .ep-chev { transform: rotate(180deg); }
.ep-body { border-top: 0.5px solid var(--border); padding: 12px 14px; background: var(--surface-1); display: none; }
.ep-body.open { display: block; }
.section-title {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .5px;
  margin: 12px 0 6px;
}
.section-title:first-child { margin-top: 0; }
.params-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.params-table th {
  color: var(--text-muted); font-weight: 400; text-align: left;
  padding: 3px 8px 5px 0; border-bottom: 0.5px solid var(--border);
}
.params-table td {
  padding: 4px 8px 4px 0; vertical-align: top;
  color: var(--text-primary); border-bottom: 0.5px solid var(--border);
}
.params-table td:first-child { font-family: var(--font-mono); color: var(--text-accent); min-width: 130px; }
.params-table td:nth-child(2) { color: var(--text-muted); min-width: 60px; }
.params-table td:nth-child(3) { font-family: var(--font-mono); color: var(--text-secondary); min-width: 120px; }
.req { color: var(--text-danger); font-size: 10px; }
.schema-block {
  background: var(--surface-2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  white-space: pre;
  overflow-x: auto;
  line-height: 1.6;
}
.schema-block .k { color: var(--text-accent); }
.schema-block .s { color: var(--text-success); }
.schema-block .n { color: var(--text-warning); }
.schema-block .b { color: var(--text-pro); }
.schema-block .comment { color: var(--text-muted); }
</style>
</head>
<body>

<header>
  <i class="ti ti-plug-connected" style="font-size:20px; color:var(--text-accent)" aria-hidden="true"></i>
  <h1>Честная Генерация — REST API</h1>
  <span class="version">v4.24.0</span>
</header>

<div class="container">
<div id="app"></div>
</div>

function renderSchema(html) {
  return `<div class="schema-block">${html}</div>`;
}

function renderParams(params) {
  if (!params || params.length === 0) return '';
  return `<div class="section-title">Parameters</div>
<table class="params-table">
<thead><tr><th>Name</th><th>In</th><th>Type</th><th>Description</th></tr></thead>
<tbody>${params.map(p => `<tr>
  <td>${p.name}${p.req ? ' <span class="req">*</span>' : ''}</td>
  <td>${p.loc}</td>
  <td>${p.type}</td>
  <td>${p.desc}</td>
</tr>`).join('')}</tbody></table>`;
}

let epIdx = 0;
function renderEp(ep) {
  const id = `ep-${epIdx++}`;
  return `<div class="ep">
  <div class="ep-head" id="${id}-head" onclick="toggleEp('${id}')">
    <span class="method ${ep.method}">${ep.method}</span>
    <span class="path">${ep.path}</span>
    <span class="ep-summary">${ep.summary}</span>
    <i class="ti ti-chevron-down ep-chev" aria-hidden="true"></i>
  </div>
  <div class="ep-body" id="${id}">
    ${renderParams(ep.params)}
    ${ep.body ? `<div class="section-title">Request body</div>${renderSchema(ep.body)}` : ''}
    <div class="section-title">Response 200</div>
    ${renderSchema(ep.response)}
  </div>
</div>`;
}

function renderTag(tag) {
  const id = `tag-${tag.name.replace(/\s+/g, '-')}`;
  return `<div class="tag-section">
  <div class="tag-label" onclick="toggleTag('${id}')">
    <i class="ti ${tag.icon}" aria-hidden="true"></i>
    ${tag.name}
    <i class="ti ti-chevron-down chevron" id="${id}-chev"></i>
  </div>
  <div class="endpoints" id="${id}">${tag.endpoints.map(renderEp).join('')}</div>
</div>`;
}

document.getElementById('app').innerHTML = tags.map(renderTag).join('');

function toggleEp(id) {
  const body = document.getElementById(id);
  const head = document.getElementById(id + '-head');
  body.classList.toggle('open');
  head.classList.toggle('open');
}

function toggleTag(id) {
  const el = document.getElementById(id);
  const chev = document.getElementById(id + '-chev');
  const label = chev.closest('.tag-label');
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  label.classList.toggle('collapsed', !hidden);
}
